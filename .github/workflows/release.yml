name: Binary relasases for jank/llvm

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:

  windows-build-clang:
    name: Windows MSYS2 - clang
    runs-on: windows-2022
    timeout-minutes: 200
    if: startsWith(github.event.release.tag_name, 'llvm-')
    outputs:
      jank-win-commit: ${{ steps.get-jank-commit.outputs.jank_win_commit }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout the release repo
        run: |
          git clone https://github.com/ikappaki/jank-win.git jank-win

      - name: Record jank-win commit
        id: get-jank-commit
        run: |
          cd jank-win
          echo "jank_win_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Cache Clang/LLVM
        id: clang-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: |
            ${{ github.workspace }}/jank-win/compiler+runtime/build/llvm-install
          key: clang-${{ runner.os }}-${{ hashFiles('jank-win/compiler+runtime/bin/build-clang', 'jank-win/compiler+runtime/third-party/MINGW-packages/mingw-w64-llvm/**') }}

      - uses: msys2/setup-msys2@v2
        if: steps.clang-cache.outputs.cache-hit != 'true'
        with:
          msystem: CLANG64
          install: base-devel git tar mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-ninja mingw-w64-clang-x86_64-pkgconf mingw-w64-clang-x86_64-libunwind mingw-w64-clang-x86_64-libffi mingw-w64-clang-x86_64-z3 mingw-w64-clang-x86_64-python mingw-w64-clang-x86_64-compiler-rt mingw-w64-clang-x86_64-libc++
          update: true

      - name: Build Clang/LLVM
        if: steps.clang-cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        env:
          MSYSTEM: CLANG64
        run: |
          pushd jank-win/compiler+runtime
            ./bin/build-clang
          popd

      - name: Verify cached Clang
        env:
          MSYSTEM: CLANG64
        run: dir jank-win/compiler+runtime/build/llvm-install

        # if there is a cache hit, we still need to install tar
      - uses: msys2/setup-msys2@v2
        if: steps.clang-cache.outputs.cache-hit == 'true'
        with:
          msystem: CLANG64
          install: tar

      - name: Archive LLVM build contents
        shell: msys2 {0}
        env:
          MSYSTEM: CLANG64
        run: |
          cd jank-win/compiler+runtime/build/llvm-install
          tar -cf ../${{ github.event.release.tag_name }}.tar .
          cd ..
          sha256sum ${{ github.event.release.tag_name }}.tar > ${{ github.event.release.tag_name }}.tar.sha256
          ls -al

      - name: Upload LLVM to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jank-win/compiler+runtime/build/llvm-*.tar
            jank-win/compiler+runtime/build/llvm-*.tar.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    if: startsWith(github.event.release.tag_name, 'jank-')
    strategy:
      fail-fast: false
      matrix:
        include: [
          # { msystem: UCRT64, runner: windows-2022},
          { msystem: CLANG64, runner: windows-2022},
          # { msystem: MINGW64, runner: windows-2022},
          # { msystem: MINGW32, runner: windows-2022},
          # { msystem: CLANGARM64, runner: windows-11-arm}
        ]
    name: ${{ matrix.msystem }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout jank-win source code
        run: |
          git clone https://github.com/ikappaki/jank-win.git jank-win
          git submodule update --init --recursive --jobs 8

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: base-devel curl mingw-w64-clang-x86_64-git-lfs mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-dlfcn mingw-w64-clang-x86_64-libffi mingw-w64-clang-x86_64-doctest mingw-w64-clang-x86_64-libzip
          update: true

      - name: install jank clang64 compiler
        shell: msys2 {0}
        run: |
          ./jank-win-install

      - name: build
        shell: msys2 {0}
        run: |
          dos2unix PKGBUILD
          mkdir -p src
          mv jank-win src
          makepkg-mingw -s -f -i --noconfirm || makepkg-mingw -s -f -i --noconfirm

          f=mingw-w64-clang-x86_64-jank*.tar.zst
          sha256sum "$f" > "$f.sha256"

          ls -al

      - name: test
        shell: msys2 {0}
        run: |
          jank check-health

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jank-build
          path: |
            src/jank-win/compiler+runtime/build/llvm-install
            mingw-w64-clang-x86_64-jank*.tar.zst
            mingw-w64-clang-x86_64-jank*.tar.zst.sha256
